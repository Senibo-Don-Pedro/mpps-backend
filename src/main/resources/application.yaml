spring:
  application:
    name: mpps

  datasource:
    url: jdbc:postgresql://localhost:5432/mpps_db
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    repair-on-migrate: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
