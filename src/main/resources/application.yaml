server:
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

webhook:
  target-url: https://webhook.site/6af17b7f-ce57-4604-8773-dff6eeba8651

spring:
  application:
    name: mpps
  jackson:
    time-zone: UTC

  datasource:
    url: jdbc:postgresql://localhost:5432/mpps_db
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 5
          max-interval: 30s
          multiplier: 2.0
        default-requeue-rejected: false


springdoc:
  swagger-ui:
    path: /swagger
